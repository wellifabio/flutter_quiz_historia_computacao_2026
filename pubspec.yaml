name: quiz_historia_computacao
description: "Projeto de exemplo com questões sobre história da computação."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone.png"
  
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/mockups/
